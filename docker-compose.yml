version: "3.9"

services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  agent:
    build: .
    command: python -m agent.agent start
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      - api
    restart: unless-stopped
